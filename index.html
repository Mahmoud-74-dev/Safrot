<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منيو سفروت - منفلوط</title>
    <link rel="stylesheet" href="style.css?v=2">
    <link href="https://fonts.googleapis.com/css2?family=El+Messiri:wght@600;700;800&family=Almarai:wght@300;400;700;800&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
    <noscript><link href="https://fonts.googleapis.com/css2?family=El+Messiri:wght@600;700;800&family=Almarai:wght@300;400;700;800&display=swap" rel="stylesheet"></noscript>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#ff6b00">
    <link rel="apple-touch-icon" href="safrot.png">

    <!-- Firebase SDK v12 compat -->
    <script src="https://www.gstatic.com/firebasejs/12.10.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/12.10.0/firebase-database-compat.js"></script>
    <style>
        #offersSection { padding: 0.8rem 1rem 0; max-width: 700px; margin: 0 auto; }
        .offer-banner {
            background: linear-gradient(135deg, rgba(255,106,26,0.15), rgba(255,60,0,0.08));
            border: 1px solid rgba(255,106,26,0.35);
            border-radius: 14px;
            padding: 0.9rem 1.1rem;
            margin-bottom: 0.7rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 0.8rem;
            animation: offerPop .4s ease;
        }
        @keyframes offerPop { from{opacity:0;transform:translateY(-8px)} to{opacity:1;transform:translateY(0)} }
        .offer-banner-body  { flex: 1; min-width: 0; }
        .offer-banner-title { font-weight: 900; color: #ff6a1a; font-size: 1rem; margin-bottom: 0.2rem; }
        .offer-banner-desc  { font-size: 0.87rem; color: rgba(240,235,229,0.7); line-height: 1.4; }
        .offer-banner-price { font-size: 0.9rem; font-weight: 900; color: #ff6a1a; margin-top: 0.2rem; }
        .offer-add-btn {
            background: linear-gradient(135deg, #ff6a1a, #e04e00);
            color: white; border: none; border-radius: 10px;
            padding: 9px 16px; font-size: 1rem; font-weight: 700;
            font-family: 'Cairo', sans-serif; cursor: pointer;
            white-space: nowrap; flex-shrink: 0;
            box-shadow: 0 3px 12px rgba(255,106,26,0.4);
            transition: opacity .2s, transform .1s;
        }
        .offer-add-btn:hover  { opacity: 0.9; }
        .offer-add-btn:active { transform: scale(0.96); }

        /* ══════════════ CART FAB ══════════════ */
        .cart-fab {
            position: fixed; bottom: 1.6rem; left: 1.6rem; z-index: 90;
            width: 58px; height: 58px; border-radius: 18px;
            background: #ff6a1a;
            color: white; border: none; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 8px 28px rgba(255,106,26,0.45);
            transition: transform .2s, box-shadow .2s;
        }
        .cart-fab:hover { transform: translateY(-2px); box-shadow: 0 12px 32px rgba(255,106,26,0.55); }
        .cart-fab:active { transform: scale(.95); }
        .cart-badge {
            position: absolute; top: -6px; right: -6px;
            background: #fff; color: #ff6a1a;
            font-size: .7rem; font-weight: 800;
            width: 20px; height: 20px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-family: 'Almarai', sans-serif;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }
        .cart-fab.bump { animation: cartBump .25s ease; }
        @keyframes cartBump { 0%,100%{transform:scale(1)} 50%{transform:scale(1.15)} }

        /* ══════════════ CART DRAWER ══════════════ */
        .cart-overlay {
            display: none; position: fixed; inset: 0;
            background: rgba(0,0,0,0.6); z-index: 95;
            backdrop-filter: blur(4px);
        }
        .cart-overlay.open { display: block; animation: fadeIn .2s ease; }
        @keyframes fadeIn { from{opacity:0} to{opacity:1} }

        .cart-drawer {
            position: fixed; bottom: .6rem; left: 0; right: 0; z-index: 96;
            transform: translateY(110%);
            transition: transform .35s cubic-bezier(.32,.72,0,1);
            height: 55vh;
            padding: 0 .7rem;
        }
        .cart-drawer.active { transform: translateY(0); }

        .cart-drawer-inner {
            background: rgba(14,14,14,0.75);
            backdrop-filter: blur(28px);
            -webkit-backdrop-filter: blur(28px);
            border-radius: 22px 22px 16px 16px;
            border: 1px solid rgba(255,255,255,0.07);
            display: flex; flex-direction: column;
            height: 100%; overflow: hidden;
        }

        /* TOP */
        .cart-top {
            padding: 1rem 1.2rem .8rem;
            display: flex; align-items: center; justify-content: space-between;
            border-bottom: 1px solid rgba(255,255,255,0.06);
            flex-shrink: 0;
        }
        /* handle bar */
        .cart-top::before {
            content: ''; position: absolute;
            top: .6rem; left: 50%; transform: translateX(-50%);
            width: 36px; height: 4px; border-radius: 2px;
            background: rgba(255,255,255,0.15);
        }
        .cart-drawer-inner { position: relative; }
        .cart-top-title { font-family: 'El Messiri', sans-serif; font-size: 1.15rem; font-weight: 700; color: #ede8e3; }
        .cart-top-count { font-size: .78rem; color: rgba(237,232,227,0.4); font-weight: 600; margin-right: .5rem; }
        .cart-close-btn {
            width: 32px; height: 32px; border-radius: 8px;
            background: rgba(255,255,255,0.07); border: none;
            color: rgba(237,232,227,0.6); cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: all .15s;
        }
        .cart-close-btn:hover { background: rgba(255,255,255,0.12); color: #ede8e3; }

        /* ITEMS */
        .cart-items-wrap {
            flex: 1; overflow-y: auto; padding: .8rem 1.2rem;
            scrollbar-width: none;
        }
        .cart-items-wrap::-webkit-scrollbar { display: none; }

        .cart-empty {
            text-align: center; padding: 2.5rem 1rem;
            color: rgba(237,232,227,0.3);
        }
        .cart-empty-icon { font-size: 2.5rem; margin-bottom: .5rem; opacity: .4; }
        .cart-empty-text { font-size: .88rem; }

        .cart-item {
            display: flex; align-items: center; gap: .8rem;
            padding: .75rem 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .cart-item:last-child { border-bottom: none; }
        .cart-item-info { flex: 1; min-width: 0; }
        .cart-item-name { font-weight: 700; color: #ede8e3; font-size: .9rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .cart-item-variant { font-size: .75rem; color: rgba(237,232,227,0.4); margin-top: 1px; }
        .cart-item-price { font-size: .88rem; font-weight: 700; color: #ff6a1a; margin-top: 2px; font-family: 'El Messiri', sans-serif; }

        .cart-qty {
            display: flex; align-items: center; gap: .4rem; flex-shrink: 0;
        }
        .qty-btn {
            width: 28px; height: 28px; border-radius: 8px;
            background: rgba(255,255,255,0.07); border: none;
            color: #ede8e3; cursor: pointer; font-size: 1rem; font-weight: 700;
            display: flex; align-items: center; justify-content: center;
            transition: all .15s;
        }
        .qty-btn:hover { background: rgba(255,106,26,0.25); color: #ff6a1a; }
        .qty-num { font-size: .9rem; font-weight: 800; color: #ede8e3; min-width: 18px; text-align: center; font-family: 'El Messiri', sans-serif; }
        .cart-del-btn {
            width: 28px; height: 28px; border-radius: 8px;
            background: rgba(255,61,87,0.1); border: none;
            color: rgba(255,61,87,0.6); cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: all .15s; flex-shrink: 0;
        }
        .cart-del-btn:hover { background: rgba(255,61,87,0.2); color: #ff3d57; }

        /* INFO FIELDS */
        .cart-info-section {
            padding: .7rem 1.2rem;
            border-top: 1px solid rgba(255,255,255,0.06);
            display: flex; flex-direction: column; gap: .5rem;
            flex-shrink: 0;
        }
        .cart-info-field {
            display: flex; align-items: center; gap: .6rem;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.07);
            border-radius: 10px; padding: .6rem .9rem;
            transition: border-color .2s;
        }
        .cart-info-field:focus-within { border-color: rgba(255,106,26,0.4); }
        .cart-info-icon { font-size: .9rem; flex-shrink: 0; }
        .cart-info-input {
            flex: 1; background: none; border: none; outline: none;
            color: #ede8e3; font-family: 'Almarai', sans-serif; font-size: .85rem;
        }
        .cart-info-input::placeholder { color: rgba(237,232,227,0.25); }

        /* BOTTOM */
        .cart-bottom {
            padding: .8rem 1.2rem 1.2rem;
            border-top: 1px solid rgba(255,255,255,0.06);
            flex-shrink: 0;
        }
        .cart-total-row {
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: .8rem;
        }
        .cart-total-label { font-size: .82rem; color: rgba(237,232,227,0.45); font-weight: 600; }
        .cart-total-val { font-family: 'El Messiri', sans-serif; font-size: 1.3rem; font-weight: 700; color: #ff6a1a; }
        .cart-order-btn {
            width: 100%; padding: 14px;
            background: #ff6a1a; color: white; border: none; border-radius: 14px;
            font-family: 'El Messiri', sans-serif; font-size: 1.05rem; font-weight: 700;
            cursor: pointer; display: flex; align-items: center; justify-content: center; gap: .5rem;
            box-shadow: 0 6px 20px rgba(255,106,26,0.4);
            transition: background .2s, transform .1s, box-shadow .2s;
        }
        .cart-order-btn:hover { background: #e04e00; box-shadow: 0 8px 28px rgba(255,106,26,0.5); }
        .cart-order-btn:active { transform: scale(.98); }

        /* hide old classes */
        .cart-footer, .cart-header, .cart-order-info, .cart-field,
        .cart-sidebar, .order-btn, .total { display: none !important; }
        body, input, textarea, button, select {
            font-family: 'Almarai', sans-serif !important;
        }
        h1, h2, h3,
        .slogan,
        .accordion,
        .item span,
        .item-info span,
        .cart-header h2,
        .order-btn,
        .price {
            font-family: 'El Messiri', sans-serif !important;
        }
        /* ضبط الأوزان */
        h1 { font-weight: 800 !important; letter-spacing: -0.5px; }
        .slogan { font-weight: 600 !important; }
        .accordion { font-weight: 700 !important; font-size: 1.05rem !important; }
        .price { font-weight: 700 !important; }
        .order-btn { font-weight: 700 !important; letter-spacing: 0.3px; }
        .choice-card {
            display: flex; align-items: center; justify-content: space-between;
            padding: 13px 16px; margin: 7px 0;
            border: 1.5px solid rgba(255,106,26,0.25); border-radius: 12px;
            background: rgba(255,255,255,0.04); cursor: pointer;
            transition: all 0.18s ease;
        }
        .choice-card:hover   { border-color: rgba(255,106,26,0.6); background: rgba(255,106,26,0.08); }
        .choice-card.selected { border-color: #ff6a1a; background: rgba(255,106,26,0.18); transform: scale(1.02); }
        .choice-label { font-family:'Cairo',sans-serif; font-weight:700; font-size:1rem; color:#f0ebe5; }
        .choice-price { font-family:'Cairo',sans-serif; font-weight:900; font-size:.95rem; color:#ff6a1a; background:rgba(255,106,26,0.12); padding:3px 10px; border-radius:20px; }

        /* حقول العنوان والملاحظات */
        .cart-order-info { padding: 0 1rem 0.5rem; display: flex; flex-direction: column; gap: 0.6rem; }
        .cart-field label { display: block; font-size: 0.82rem; font-weight: 700; color: rgba(255,255,255,0.5); margin-bottom: 4px; font-family: 'Cairo', sans-serif; }
        .cart-field input,
        .cart-field textarea {
            width: 100%; padding: 10px 12px;
            background: rgba(255,255,255,0.06);
            border: 1.5px solid rgba(255,106,26,0.2);
            border-radius: 10px; color: #f0ebe5;
            font-family: 'Cairo', sans-serif; font-size: 0.9rem;
            resize: none; transition: border-color .2s;
        }
        .cart-field input::placeholder,
        .cart-field textarea::placeholder { color: rgba(255,255,255,0.25); }
        .cart-field input:focus,
        .cart-field textarea:focus { outline: none; border-color: #ff6a1a; background: rgba(255,106,26,0.07); }
        /* ── INTRO SCREEN ── */
        #introScreen {
            position: fixed; inset: 0; z-index: 9999;
            background: #080808;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center; gap: 1rem;
            transition: opacity .5s ease, visibility .5s ease;
        }
        #introScreen.hide { opacity: 0; visibility: hidden; pointer-events: none; }
        .intro-logo {
            width: 90px; height: 90px; border-radius: 24px; object-fit: contain;
            filter: drop-shadow(0 0 24px rgba(255,106,26,0.6));
            animation: introPop .6s cubic-bezier(.34,1.56,.64,1) both;
        }
        @keyframes introPop { from{opacity:0;transform:scale(.7)} to{opacity:1;transform:scale(1)} }
        .intro-name {
            font-family: 'El Messiri', sans-serif;
            font-size: 2rem; font-weight: 800; color: #ede8e3;
            animation: introFade .5s .2s ease both;
        }
        .intro-sub {
            font-size: .85rem; color: rgba(237,232,227,0.35);
            animation: introFade .5s .35s ease both;
        }
        .intro-bar {
            width: 120px; height: 3px; border-radius: 3px;
            background: rgba(255,255,255,0.08); overflow: hidden;
            animation: introFade .5s .4s ease both;
        }
        .intro-bar-fill {
            height: 100%; width: 0%;
            background: linear-gradient(90deg, #e04e00, #ff6a1a);
            border-radius: 3px;
            animation: introLoad 2.8s .2s ease forwards;
        }
        @keyframes introFade { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
        @keyframes introLoad { from{width:0%} to{width:100%} }
    </style>
</head>
<body>

    <!-- انتر سكرين -->
    <div id="introScreen">
        <img src="safrot.png" class="intro-logo" alt="سفروت" onerror="this.style.display='none'">
        <div class="intro-name">سفروت</div>
        <div class="intro-sub">أجمد كريب في منفلوط 🔥</div>
        <div class="intro-bar"><div class="intro-bar-fill"></div></div>
    </div>

    <header>
        <div class="logo-wrapper">
            <div class="image-box" id="logoBox">
                <img src="safrot.png" alt="سفروت" onerror="this.style.display='none'">
            </div>
        </div>
        <h1>سفروت</h1>
        <p class="slogan">أجمد كريب في منفلوط 🔥</p>
        <div class="search-area">
            <input type="text" id="searchInput" placeholder="ابحث عن أكلة.. (مثلاً: زنجر)">
        </div>
    </header>

    <!-- العروض — بتظهر لو فيه عروض فعّالة -->
    <div id="offersSection" style="display:none">
        <div id="offersContainer"></div>
    </div>

    <!-- المنيو هيتحمل من Firebase أوتوماتيك -->
    <div class="container" id="menuContainer">
        <div style="text-align:center; padding:2rem; color:#aaa;">
            <div style="font-size:2rem;">⏳</div>
            <p>جاري تحميل المنيو...</p>
        </div>
    </div>

    <div id="sizeModal" class="modal">
        <div class="modal-content glass">
            <h3 id="modalItemName"></h3>
            <p>اختر من القائمة:</p>
            <div id="sizeOptions"></div>
            <button onclick="closeModal()" class="close-btn">إلغاء</button>
        </div>
    </div>

    <!-- زرار السلة -->
    <div id="cartTrigger" class="cart-fab" onclick="toggleCart()">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>
        <span id="cartCount" class="cart-badge">0</span>
    </div>

    <!-- السلة -->
    <div id="cartModal" class="cart-drawer">
        <div class="cart-drawer-inner">

            <!-- الهيدر -->
            <div class="cart-top">
                <div class="cart-top-info">
                    <span class="cart-top-title">طلبك</span>
                    <span class="cart-top-count" id="cartTopCount">0 صنف</span>
                </div>
                <button class="cart-close-btn" onclick="toggleCart()">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                </button>
            </div>

            <!-- الأصناف -->
            <div class="cart-items-wrap" id="cartItems"></div>

            <!-- العنوان والملاحظات -->
            <div class="cart-info-section">
                <div class="cart-info-field">
                    <div class="cart-info-icon">📍</div>
                    <input type="text" id="customerAddress" class="cart-info-input" placeholder="عنوانك للتوصيل">
                </div>
                <div class="cart-info-field">
                    <div class="cart-info-icon">✏️</div>
                    <input type="text" id="customerNotes" class="cart-info-input" placeholder="ملاحظات (اختياري)">
                </div>
            </div>

            <!-- الفوتر -->
            <div class="cart-bottom">
                <div class="cart-total-row">
                    <span class="cart-total-label">الإجمالي</span>
                    <span class="cart-total-val"><span id="cartTotal">0</span> ج</span>
                </div>
                <button onclick="sendOrder()" class="cart-order-btn">
                    إتمام الطلب
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
                </button>
            </div>

        </div>
    </div>
    <div class="cart-overlay" onclick="toggleCart()"></div>

    <footer>
        <div class="footer-info">
            <p>📍 العنوان: أسيوط - منفلوط - شارع العشرين - خلف موقف الحواتكة - بجوار ستوديو زووم</p>
            <p id="workHours"></p>
        </div>
        <div class="contact-buttons">
            <a href="https://www.facebook.com/share/18PGB1cUcs/" target="_blank" class="fb-btn">
                <i class="fab fa-facebook-f"></i> فيسبوك
            </a>
        </div>
    </footer>

    <script>
    // ── انتر سكرين — يختفي لما المنيو يتحمل أو بعد 3 ثواني كحد أقصى ──
    let introHidden = false;
    function hideIntro() {
        if (introHidden) return;
        introHidden = true;
        document.getElementById('introScreen').classList.add('hide');
    }
    setTimeout(hideIntro, 3000);

    // ============================================================
    // 🔥 Firebase Config
    // ============================================================
    const firebaseConfig = {
        apiKey:            "AIzaSyB9SPgS_LfMrcvTGjL4azXOIMtdR0WFhDc",
        authDomain:        "safrot-72.firebaseapp.com",
        databaseURL:       "https://safrot-72-default-rtdb.firebaseio.com",
        projectId:         "safrot-72",
        storageBucket:     "safrot-72.firebasestorage.app",
        messagingSenderId: "13434525505",
        appId:             "1:13434525505:web:ce09ae5c0a8f39afb0b3c0",
        measurementId:     "G-3NDYYW3QEK"
    };

    firebase.initializeApp(firebaseConfig);
    const menuRef = firebase.database().ref('menu');

    // ── يوم الإجازة — بعد initializeApp ──
    firebase.database().ref('settings/offDay').on('value', snap => {
        const offDay = snap.val();
        if (offDay === null || offDay === undefined) return;
        const today = new Date().getDay();
        if (parseInt(offDay) === today) {
            const days = ['الأحد','الاثنين','الثلاثاء','الأربعاء','الخميس','الجمعة','السبت'];
            if (document.getElementById('offDayBanner')) return;
            const banner = document.createElement('div');
            banner.id = 'offDayBanner';
            banner.style.cssText = `
                background:rgba(255,61,87,0.12);border:1px solid rgba(255,61,87,0.3);
                border-radius:14px;padding:.9rem 1.1rem;margin:.8rem 1rem 0;
                text-align:center;font-weight:700;color:#ff6b6b;font-size:.95rem;
            `;
            banner.textContent = `🗓️ المطعم عنده إجازة ${days[today]} — هنشوفك تاني يوم! 🙏`;
            document.querySelector('header').insertAdjacentElement('afterend', banner);
        }
    });

    // ============================================================
    // 🔑 السر: اضغط اللوجو 5 مرات تتحول لصفحة الأدمن
    // ============================================================
    let tapCount = 0, tapTimer;
    document.getElementById('logoBox').addEventListener('click', () => {
        tapCount++;
        clearTimeout(tapTimer);
        tapTimer = setTimeout(() => tapCount = 0, 2000);
        if (tapCount >= 3) {
            tapCount = 0;
            window.location.href = 'admin.html';
        }
    });

    // ============================================================
    // 🍽️ تحميل المنيو من Firebase وعرضه
    // ============================================================
    function buildMenu(categories) {
        const container = document.getElementById('menuContainer');
        if (!categories || !categories.length) {
            container.innerHTML = '<div style="text-align:center;padding:2rem;color:#aaa;">المنيو فاضي حالياً</div>';
            return;
        }

        const sorted = [...categories].sort((a, b) => (a.ord || 0) - (b.ord || 0));
        let html = '';

        sorted.forEach(cat => {
            const items = Array.isArray(cat.items)
                ? cat.items
                : cat.items ? Object.values(cat.items) : [];
            const sortedItems = [...items].sort((a, b) => (a.ord || 0) - (b.ord || 0));

            html += `<button class="accordion">${cat.emoji || ''} ${cat.name}<span>+</span></button>`;
            html += `<div class="panel">`;

            sortedItems.forEach(item => {
                const priceText = item.price || '';
                const onclick   = buildOnclick(item.name, priceText);
                const descHtml  = item.desc ? `<p>${item.desc}</p>` : '';

                html += `
                    <div class="item" onclick="${onclick}">
                        <div class="item-info">
                            <span>${item.name}</span>
                            ${descHtml}
                        </div>
                        <div class="price-section">
                            <span class="price">${priceText}</span>
                            <button class="add-btn"><i class="fas fa-plus"></i></button>
                        </div>
                    </div>`;
            });

            html += `</div>`;
        });

        container.innerHTML = html;

        // إعادة تفعيل الـ accordion — بيقفل الباقيين لما تفتح واحد
        document.querySelectorAll('.accordion').forEach(btn => {
            btn.addEventListener('click', function () {
                const isOpen = !!this.nextElementSibling.style.maxHeight;

                // اقفل كل الأقسام الأول
                document.querySelectorAll('.accordion').forEach(other => {
                    other.classList.remove('active');
                    other.nextElementSibling.style.maxHeight = null;
                    const s = other.querySelector('span');
                    if (s) s.textContent = '+';
                });

                // لو الضغطة على قسم مقفول، افتحه
                if (!isOpen) {
                    this.classList.add('active');
                    this.nextElementSibling.style.maxHeight = this.nextElementSibling.scrollHeight + 'px';
                    const span = this.querySelector('span');
                    if (span) span.textContent = '−';
                }
            });
        });
    }

    // بيحوّل الصنف لـ onclick مناسب — بيكتشف الـ / أوتوماتيك
    function buildOnclick(name, priceText) {
        const nums     = priceText.match(/\d+/g);
        const safeName = name.replace(/'/g, "\\'");

        // استخرج الخيارات من الـ /
        // شيل محتوى الأقواس زي (رومي/موزاريلا/شيدر) أو اشتغل على الاسم كله
        const parenMatch = name.match(/\(([^)]+\/[^)]+)\)/);
        const slashSource = parenMatch ? parenMatch[1] : name;
        const hasSlash    = slashSource.includes('/');

        if (hasSlash) {
            // استخرج الخيارات من الـ /
            const rawParts = slashSource.split('/').map(p => p.trim()).filter(Boolean);

            if (!nums || nums.length === 1) {
                // سعر واحد — الخيارات هي أجزاء الـ /
                const price   = nums ? nums[0] : 0;
                const prices  = rawParts.map(() => price).join(',');
                const options = rawParts.join(',');
                return `openOptionsModal('${safeName}', '${prices}', '${options}')`;
            } else {
                // أكتر من سعر — اعمل combinations (نوع × حجم)
                const sizes   = nums.length === 2 ? ['صغير','كبير'] : nums.map((_,i) => `حجم ${i+1}`);
                const combos  = [];
                const prices  = [];
                rawParts.forEach(part => {
                    sizes.forEach((size, si) => {
                        combos.push(`${part} ${size}`);
                        prices.push(nums[si]);
                    });
                });
                return `openOptionsModal('${safeName}', '${prices.join(',')}', '${combos.join(',')}')`;
            }
        }

        // مفيش / — الـ logic القديمة
        if (!nums || nums.length === 1) {
            const price = nums ? nums[0] : 0;
            return `addToCart('${safeName}', 'عادي', ${price})`;
        }
        const prices = nums.join(',');
        const sizeLabels = { 2:'صغير,كبير', 3:'سنجل,دبل,تريبل', 4:'صغير,وسط,كبير,إكسترا' };
        const sizes = sizeLabels[nums.length] || nums.map((_,i) => `خيار ${i+1}`).join(',');
        return `openOptionsModal('${safeName}', '${prices}', '${sizes}')`;
    }

    // تحميل مواعيد العمل من Firebase
    firebase.database().ref('settings/hours').on('value', snap => {
        const v = snap.val();
        if (!v) return;
        const fmt = t => {
            const [h, m] = t.split(':').map(Number);
            const mm = m ? ':' + String(m).padStart(2,'0') : '';
            if (h === 0)  return '12' + mm + ' صباحاً';
            if (h < 12)   return h + mm + ' صباحاً';
            if (h === 12) return '12' + mm + ' ظهراً';
            return (h - 12) + mm + ' مساءً';
        };
        // فترتين
        if (v.shift1Open && v.shift2Open) {
            document.getElementById('workHours').textContent =
                '🕒 من ' + fmt(v.shift1Open) + ' لـ ' + fmt(v.shift1Close) +
                '  •  من ' + fmt(v.shift2Open) + ' لـ ' + fmt(v.shift2Close);
        } else if (v.open) {
            document.getElementById('workHours').textContent =
                '🕒 مواعيد العمل: من ' + fmt(v.open) + ' حتى ' + fmt(v.close);
        }
    });

    // تحميل العروض
    firebase.database().ref('offers').on('value', snap => {
        const val = snap.val() || {};
        const active = Object.values(val).filter(o => o.active);
        const section = document.getElementById('offersSection');
        const container = document.getElementById('offersContainer');
        if (!active.length) { section.style.display = 'none'; return; }
        section.style.display = 'block';
        container.innerHTML = active.map(o => `
            <div class="offer-banner">
                <div class="offer-banner-body">
                    <div class="offer-banner-title">🔥 ${o.title}</div>
                    ${o.desc  ? `<div class="offer-banner-desc">${o.desc}</div>`   : ''}
                    ${o.price ? `<div class="offer-banner-price">${o.price}ج</div>` : ''}
                </div>
                ${o.price ? `<button class="offer-add-btn" onclick="addToCart('${o.title.replace(/'/g,"\\'")}', 'عرض', ${parseInt(o.price)||0})">+ أضف</button>` : ''}
            </div>`).join('');
    });

    // تحميل البيانات
    menuRef.on('value', snap => {
        const val = snap.val();
        if (!val) { buildMenu([]); hideIntro(); return; }
        const arr = Array.isArray(val) ? val : Object.values(val);
        buildMenu(arr);
        hideIntro();
    });
    </script>

    <script src="script.js?v=2"></script>
</body>
</html>
